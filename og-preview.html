<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OG Image Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #e5e5ea;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 32px;
      font-family: -apple-system, sans-serif;
      padding: 48px 24px;
    }
    .label {
      font-size: 13px;
      color: #888;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── The actual OG image — 1200×630 scaled to 50% for preview ── */
    .og-frame {
      width: 600px;
      height: 315px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.1);
      position: relative;
      background: #ffffff;
    }

    /* ─ Layout ─ */
    .og-inner {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 220px;
      position: relative;
      overflow: hidden;
    }

    /* Left — text side */
    .og-left {
      padding: 36px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: #ffffff;
      position: relative;
      z-index: 2;
    }

    .og-eyebrow {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #4E008E;
      opacity: 0.7;
    }

    .og-name {
      font-family: 'OggLocal', Georgia, serif;
      font-style: italic;
      font-weight: 800;
      font-size: 52px;
      letter-spacing: -0.03em;
      line-height: 0.95;
      color: #4E008E;
    }

    .og-tagline {
      font-size: 11px;
      font-weight: 400;
      line-height: 1.6;
      color: #58534D;
      letter-spacing: 0em;
      max-width: 260px;
    }

    .og-url {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: #aeaeb2;
      text-transform: uppercase;
    }

    /* Right — purple panel with flower */
    .og-right {
      background: #4E008E;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle grain texture */
    .og-right::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
    }

    /* Radial glow */
    .og-right::after {
      content: '';
      position: absolute;
      inset: -20%;
      background: radial-gradient(ellipse at 60% 40%, rgba(255,255,255,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    .og-flower {
      width: 91px;
      height: 91px;
      object-fit: contain;
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.3));
    }

    /* Thin divider line between left and right */
    .og-divider {
      position: absolute;
      left: calc(100% - 220px);
      top: 0; bottom: 0;
      width: 1px;
      background: rgba(78,0,142,0.08);
      z-index: 3;
    }

    /* ── iMessage card mock ── */
    .imessage-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      width: 340px;
    }
    .imessage-bubble {
      background: #4E008E;
      color: white;
      border-radius: 18px 18px 4px 18px;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.4;
      align-self: flex-end;
    }
    .imessage-card {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
    }
    .imessage-card-img {
      width: 100%;
      height: 178px;
      object-fit: cover;
      display: block;
      background: #4E008E;
      position: relative;
      overflow: hidden;
    }
    .imessage-card-body {
      padding: 10px 12px 12px;
      background: #f9f9f9;
    }
    .imessage-card-url {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 2px;
    }
    .imessage-card-title {
      font-size: 13px;
      font-weight: 600;
      color: #1c1c1e;
      margin-bottom: 2px;
    }
    .imessage-card-desc {
      font-size: 11px;
      color: #888;
      line-height: 1.4;
    }

    @font-face {
      font-family: 'OggLocal';
      src: url('Portfoilo assets/OggText-ExtraboldItalic-BF646c18fc22d99.otf') format('opentype');
      font-weight: 800;
      font-style: italic;
    }
  </style>
</head>
<body>

  <p class="label">OG Image — 1200 × 630 (shown at 50%)</p>

  <div class="og-frame">
    <div class="og-inner">
      <div class="og-left">
        <span class="og-eyebrow">Portfolio</span>
        <div><div class="og-name">Todd<br>Wu</div></div>
        <p class="og-tagline">Designing for the craft.<br>Building for the people.</p>
        <span class="og-url">toddwu.com</span>
      </div>
      <div class="og-divider"></div>
      <div class="og-right" style="background:#ffffff;">
        <img class="og-flower" src="Portfoilo assets/Purple flower.png" alt="">
      </div>
    </div>
  </div>

</body>
</html>
